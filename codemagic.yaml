# Codemagic クラウドMacビルド設定（Windowsだけで App Store 提出するための構成）
#
# 事前準備（Codemagic の Web UI で1回だけ設定）:
#  1. GitHub リポジトリを Codemagic に接続
#  2. Settings > Integrations > App Store Connect に API キーを登録し、
#     その名前を下の integrations.app_store_connect に記入（既定: "AppStoreConnect"）
#  3. Apple Developer で Bundle ID `com.kkokichi.muscleup` を登録
#  4. App Store Connect で同じ Bundle ID のアプリを作成
#
# 署名は environment.ios_signing による宣言的方式。integrations の API キーを使い、
# 証明書・プロビジョニングプロファイルの取得/作成/適用を Codemagic が自動で行う。
workflows:
  ios-appstore:
    name: MuscleUp iOS (App Store)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: AppStoreConnect
    environment:
      # App Store 配布用の署名（証明書/プロファイルは自動取得・無ければ自動作成）
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kkokichi.muscleup
      # Capacitor 8 の CLI は Node 22 以上が必須
      node: 22
      xcode: latest
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: 依存関係のインストール
        script: npm ci
      - name: Web ビルド + Capacitor 同期
        script: |
          npm run build
          npx cap sync ios
      - name: ビルド番号を採番
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: 署名プロファイルを適用
        script: xcode-project use-profiles
      - name: IPA をビルド
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # 最初は TestFlight のみ。審査提出まで自動化するなら submit_to_app_store: true
        submit_to_testflight: true
