# Codemagic クラウドMacビルド設定（Windowsだけで App Store 提出するための構成）
#
# 事前準備（Codemagic の Web UI で1回だけ設定）:
#  1. GitHub リポジトリを Codemagic に接続
#  2. Settings > Integrations > App Store Connect に API キーを登録（名前: "AppStoreConnect"）
#     ※ 署名ファイルの新規作成には API キーの権限が Admin である必要がある
#  3. Apple Developer で Bundle ID `com.kkokichi.muscleup` を登録
#  4. App Store Connect で同じ Bundle ID のアプリを作成
#
# 初回ビルドで配布証明書とプロビジョニングプロファイルを自動作成し、TestFlight へアップロードする。
workflows:
  ios-appstore:
    name: MuscleUp iOS (App Store)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: AppStoreConnect
    environment:
      # Codemagic UI で作成する変数グループ（CERTIFICATE_PRIVATE_KEY を含む）
      groups:
        - appstore
      # Capacitor 8 の CLI は Node 22 以上が必須
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "com.kkokichi.muscleup"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: 依存関係のインストール
        script: npm ci
      - name: Web ビルド + Capacitor 同期
        script: |
          npm run build
          npx cap sync ios
      - name: 署名ファイル（証明書・プロファイル）を作成/取得
        script: |
          keychain initialize
          # 用意した秘密鍵で配布証明書を作成/再利用し、App Store用プロファイルを作成
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: ビルド番号を採番
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: IPA をビルド
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # 最初は TestFlight のみ。審査提出まで自動化するなら submit_to_app_store: true
        submit_to_testflight: true
